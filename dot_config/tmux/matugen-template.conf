# Matugen template for tmux — DO NOT edit the generated matugen.conf.
# Source: ~/.config/tmux/matugen-template.conf
# Output: ~/.config/tmux/matugen.conf  (sourced last by tmux.conf, overrides defaults)

# ── Status bar ──────────────────────────────────────────────
set -g status on
set -g status-position top
set -g status-interval 5
set -g status-justify left
set -g status-style "bg={{colors.surface.default.hex}},fg={{colors.on_surface_variant.default.hex}}"

# ── Left: session name, with a prefix-active indicator ──────
set -g status-left-length 60
set -g status-left "#[fg={{colors.surface.default.hex}},bg={{colors.primary.default.hex}},bold] #S #[fg={{colors.primary.default.hex}},bg={{colors.surface.default.hex}}]#{?client_prefix,#[fg={{colors.tertiary.default.hex}}] ● ,} "

# ── Windows: subtle when inactive, accented when focused ────
set -g window-status-separator ""
set -g window-status-format "#[fg={{colors.on_surface_variant.default.hex}},bg={{colors.surface.default.hex}}]  #I:#W  "
set -g window-status-current-format "#[fg={{colors.surface.default.hex}},bg={{colors.tertiary.default.hex}},bold]  #I:#W#{?window_zoomed_flag, ,}  "

# ── Right: current path + clock ─────────────────────────────
set -g status-right-length 120
set -g status-right "#[fg={{colors.on_surface_variant.default.hex}},bg={{colors.surface.default.hex}}]  #{b:pane_current_path} #[fg={{colors.surface.default.hex}},bg={{colors.secondary.default.hex}}] 󰥔 %H:%M "

# ── Panes ───────────────────────────────────────────────────
set -g pane-border-style "fg={{colors.outline.default.hex}}"
set -g pane-active-border-style "fg={{colors.primary.default.hex}}"

# ── Messages / copy-mode ────────────────────────────────────
set -g message-style "bg={{colors.surface_container_high.default.hex}},fg={{colors.on_surface.default.hex}}"
set -g message-command-style "bg={{colors.surface_container_high.default.hex}},fg={{colors.primary.default.hex}}"
set -g mode-style "bg={{colors.tertiary.default.hex}},fg={{colors.surface.default.hex}}"

# ── Clock ───────────────────────────────────────────────────
setw -g clock-mode-colour "{{colors.primary.default.hex}}"
