# Generated by matugen via noctalia. Do not edit by hand.
# Source: ~/.config/tmux/matugen-template.conf
# Output: ~/.config/tmux/matugen.conf (this file)

# ── Status bar (zellij-style hints) ─────────────────────────
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify left

set -g status-style "bg={{colors.surface.default.hex}},fg={{colors.on_surface_variant.default.hex}}"

# Left: session
set -g status-left-length 40
set -g status-left "#[fg={{colors.primary.default.hex}},bold] #S #[fg={{colors.outline.default.hex}}]│ "

# Right: zellij-style mode hint + time. ⌃␣ is Ctrl+Space.
set -g status-right-length 120
set -g status-right "#[fg={{colors.outline.default.hex}}]│#[fg={{colors.on_surface_variant.default.hex}}] prefix #[fg={{colors.tertiary.default.hex}}]⌃␣#[fg={{colors.outline.default.hex}}] · #[fg={{colors.on_surface_variant.default.hex}}]help #[fg={{colors.tertiary.default.hex}}]?#[fg={{colors.outline.default.hex}}] · #[fg={{colors.on_surface_variant.default.hex}}]quit #[fg={{colors.tertiary.default.hex}}]d #[fg={{colors.outline.default.hex}}]│#[fg={{colors.tertiary.default.hex}}] %H:%M "

# ── Windows ─────────────────────────────────────────────────
set -g window-status-separator " "
set -g window-status-format "#[fg={{colors.on_surface_variant.default.hex}}] #I:#W "
set -g window-status-current-format "#[fg={{colors.primary.default.hex}},bold] #I:#W "

# ── Panes ───────────────────────────────────────────────────
set -g pane-border-style "fg={{colors.outline.default.hex}}"
set -g pane-active-border-style "fg={{colors.primary.default.hex}}"

# ── Messages / mode ─────────────────────────────────────────
set -g message-style "bg={{colors.surface_container.default.hex}},fg={{colors.on_surface.default.hex}}"
set -g message-command-style "bg={{colors.surface_container.default.hex}},fg={{colors.primary.default.hex}}"
set -g mode-style "bg={{colors.surface_container_high.default.hex}},fg={{colors.tertiary.default.hex}}"

# ── Clock ───────────────────────────────────────────────────
setw -g clock-mode-colour "{{colors.primary.default.hex}}"
