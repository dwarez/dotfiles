# ────────────── Terminal ──────────────
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",xterm-kitty:RGB"
set -as terminal-overrides ",*256col*:Tc"

set -g mouse on
set -g escape-time 10
set -g focus-events on
set -g history-limit 50000

# ────────────── Prefix ──────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ────────────── Indexing ──────────────
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# ────────────── Reload ──────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded ~/.config/tmux/tmux.conf"

# ────────────── Pane navigation (vim-style) ──────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ────────────── Window navigation ──────────────
bind -n S-Left  previous-window
bind -n S-Right next-window
bind -n M-H previous-window
bind -n M-L next-window

# ────────────── Splits keep CWD ──────────────
bind '"' split-window -v -c "#{pane_current_path}"
bind %  split-window -h -c "#{pane_current_path}"
bind c  new-window     -c "#{pane_current_path}"

# ────────────── Copy mode (vi) ──────────────
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v     send-keys -X begin-selection
bind-key -T copy-mode-vi C-v   send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y     send-keys -X copy-selection-and-cancel

# ────────────── Plugins (TPM, XDG layout) ──────────────
set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.config/tmux/plugins/"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'alexwforsythe/tmux-which-key'

# which-key popup: prefix + ? opens it
set -g @tmux-which-key-xdg-enable 1

run '~/.config/tmux/plugins/tpm/tpm'

# Bind prefix + ? to which-key (after TPM loads it).
bind ? run-shell "~/.config/tmux/plugins/tmux-which-key/plugin.sh.tmux"

# ────────────── Theme (matugen-driven, follows wallpaper) ──────────────
# Generated from ~/.config/tmux/matugen-template.conf by noctalia/matugen.
# Sourced last so it overrides plugin defaults.
if-shell "test -f ~/.config/tmux/matugen.conf" "source-file ~/.config/tmux/matugen.conf"
