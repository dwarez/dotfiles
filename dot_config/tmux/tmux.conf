# ────────────── Terminal ──────────────
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",xterm-kitty:RGB"
set -as terminal-overrides ",*256col*:Tc"

# New panes/windows run Nushell (the interactive shell). The login shell stays
# POSIX; this only sets what tmux spawns.
set -g default-command "/opt/homebrew/bin/nu"

set -g mouse on
set -g escape-time 0
set -g focus-events on
set -g history-limit 1000000          # huge scrollback for long console output
set -g set-clipboard on               # copy straight to the system clipboard
set -g detach-on-destroy off          # stay attached when a session is killed
set -g status-position top

# ────────────── Prefix (Ctrl+Space, NOT Ctrl-b) ──────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ────────────── Indexing ──────────────
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# ────────────── Reload ──────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded ~/.config/tmux/tmux.conf"

# ────────────── Pane navigation (vim-style) ──────────────
# C-hjkl is handled seamlessly across tmux+nvim by vim-tmux-navigator below.
# prefix+hjkl remains as an explicit fallback.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ────────────── Window navigation ──────────────
bind -n S-Left  previous-window
bind -n S-Right next-window
bind -n M-H previous-window
bind -n M-L next-window

# ────────────── Splits / new window keep CWD ──────────────
bind '"' split-window -v -c "#{pane_current_path}"
bind %  split-window -h -c "#{pane_current_path}"
bind c  new-window     -c "#{pane_current_path}"

# ────────────── Copy mode (vi) — scroll up & grab output ──────────────
# prefix+[ enters copy-mode; then vim motions, v to select, y to copy, / to search.
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v     send-keys -X begin-selection
bind-key -T copy-mode-vi C-v   send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y     send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel
# enter copy-mode quickly with Alt+Up as well
bind -n M-Up copy-mode

# ────────────── Pane borders ──────────────
set -g pane-border-style 'fg=brightblack'
set -g pane-active-border-style 'fg=magenta'

# ────────────── Plugins (TPM, XDG layout) ──────────────
set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.config/tmux/plugins/"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'              # y in copy-mode -> system clipboard
set -g @plugin 'christoomey/vim-tmux-navigator'      # seamless C-hjkl nvim<->tmux
set -g @plugin 'tmux-plugins/tmux-resurrect'         # save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'         # auto save/restore
set -g @plugin 'omerxx/tmux-sessionx'                # fuzzy session switcher (prefix+o)
set -g @plugin 'omerxx/tmux-floax'                   # floating scratch pane (prefix+p)
set -g @plugin 'fcsonline/tmux-thumbs'               # hint-copy paths/hashes/IPs in copy-mode
set -g @plugin 'wfxr/tmux-fzf-url'                   # fuzzy-open URLs from scrollback
set -g @plugin 'alexwforsythe/tmux-which-key'        # prefix+? key discovery

# Session persistence
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'

# SessionX — fuzzy session manager with zoxide integration
set -g @sessionx-bind 'o'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-filter-current 'false'

# Floax — floating terminal that follows the current path
set -g @floax-bind 'p'
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-change-path 'true'

# fzf-url — pick a URL out of the visible scrollback
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# which-key popup
set -g @tmux-which-key-xdg-enable 1

run '~/.config/tmux/plugins/tpm/tpm'

bind ? run-shell "~/.config/tmux/plugins/tmux-which-key/plugin.sh.tmux"

# ────────────── Theme (matugen-driven, follows wallpaper) ──────────────
# Default look until matugen.conf is generated (matugen image <wallpaper>).
set -g status-style "bg=default,fg=white"
set -g window-status-current-style "fg=magenta,bold"
# Generated from matugen-template.conf; sourced LAST so it overrides defaults.
if-shell "test -f ~/.config/tmux/matugen.conf" "source-file ~/.config/tmux/matugen.conf"
