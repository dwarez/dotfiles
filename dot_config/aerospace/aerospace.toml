# AeroSpace config

after-startup-command = [
    'exec-and-forget borders active_color=0xddd4d4d4 inactive_color=0x33d4d4d4 width=4.0 style=round',
    'exec-and-forget open -a "Easy Move+Resize"',
]

start-at-login = true

[gaps]
inner.horizontal = 8
inner.vertical   = 8
outer.left       = 8
outer.bottom     = 8
outer.top        = 8
outer.right      = 8

[workspace-to-monitor-force-assignment]
1  = 'main'
2  = 'main'
3  = 'main'
4  = 'main'
5  = 'main'
6  = 'main'
7  = 'main'
8  = 'main'
9  = 'main'
10 = 'main'
11 = 'secondary'

[mode.main.binding]
# Layout direction
alt-e = 'layout tiles horizontal'
alt-v = 'layout tiles vertical'

# Float toggle
alt-shift-space = 'layout floating tiling'

# Focus between windows — Win/Cmd + arrows
cmd-left  = 'focus left'
cmd-down  = 'focus down'
cmd-up    = 'focus up'
cmd-right = 'focus right'

# Move the focused window — Win/Cmd + Shift + arrows
cmd-shift-left  = 'move left'
cmd-shift-down  = 'move down'
cmd-shift-up    = 'move up'
cmd-shift-right = 'move right'

# Workspace navigation
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-0     = 'workspace 10'
alt-minus = 'workspace 11'

# Move window to workspace
alt-shift-1     = ['move-node-to-workspace 1',  'workspace 1']
alt-shift-2     = ['move-node-to-workspace 2',  'workspace 2']
alt-shift-3     = ['move-node-to-workspace 3',  'workspace 3']
alt-shift-4     = ['move-node-to-workspace 4',  'workspace 4']
alt-shift-5     = ['move-node-to-workspace 5',  'workspace 5']
alt-shift-6     = ['move-node-to-workspace 6',  'workspace 6']
alt-shift-7     = ['move-node-to-workspace 7',  'workspace 7']
alt-shift-8     = ['move-node-to-workspace 8',  'workspace 8']
alt-shift-9     = ['move-node-to-workspace 9',  'workspace 9']
alt-shift-0     = ['move-node-to-workspace 10', 'workspace 10']
alt-shift-minus = ['move-node-to-workspace 11', 'workspace 11']
