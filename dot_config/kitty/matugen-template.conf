# Matugen template for kitty — DO NOT edit the generated current-theme.conf.
# Source: ~/.config/kitty/matugen-template.conf
# Output: ~/.config/kitty/current-theme.conf  (regenerated by matugen)
#
# Hybrid theme: background / foreground / cursor / selection / UI accents follow
# the wallpaper via matugen, while the 16 ANSI colours stay Kanagawa-dragon so
# terminal output (ls, syntax highlighting, TUIs) remains crisp and legible.

# ── Surfaces & text (matugen / wallpaper-driven) ─────────────────
background              {{colors.surface.default.hex}}
foreground              {{colors.on_surface.default.hex}}

cursor                  {{colors.primary.default.hex}}
cursor_text_color       {{colors.on_primary.default.hex}}

selection_background     {{colors.primary.default.hex}}
selection_foreground     {{colors.on_primary.default.hex}}

url_color               {{colors.tertiary.default.hex}}

# ── Window / tab UI (matugen) ────────────────────────────────────
active_border_color      {{colors.primary.default.hex}}
inactive_border_color    {{colors.outline.default.hex}}
bell_border_color        {{colors.error.default.hex}}

active_tab_background     {{colors.primary.default.hex}}
active_tab_foreground     {{colors.on_primary.default.hex}}
inactive_tab_background   {{colors.surface_container.default.hex}}
inactive_tab_foreground   {{colors.on_surface_variant.default.hex}}
tab_bar_background        {{colors.surface_container_low.default.hex}}

# ── 16 ANSI colours (Kanagawa dragon — kept for legibility) ──────
