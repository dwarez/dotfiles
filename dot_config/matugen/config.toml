# Matugen standalone config (used on macOS; harmless on Linux where noctalia
# drives template generation directly).
#
# Run with:  matugen image /path/to/wallpaper.jpg
# Or via the helper:  ~/.config/matugen/apply-theme.sh /path/to/wallpaper.jpg

[config]
# Default scheme — matches noctalia's "content"-style generation.
default_scheme = "scheme-content"

# ── tmux ─────────────────────────────────────────────────────
[templates.tmux]
input_path = "~/.config/tmux/matugen-template.conf"
output_path = "~/.config/tmux/matugen.conf"
post_hook = "tmux source-file ~/.config/tmux/tmux.conf 2>/dev/null || true"

# nvim uses a static colorscheme (One Dark Pro), not matugen — intentionally
# left out so the editor keeps fully saturated, distinguishable syntax colours.

# ── kitty (hybrid: matugen surfaces/accents, Kanagawa ANSI) ──
[templates.kitty]
input_path = "~/.config/kitty/matugen-template.conf"
output_path = "~/.config/kitty/current-theme.conf"
# kitty live-reloads its config (and colours) on SIGUSR1 — no remote control needed.
post_hook = "pkill -SIGUSR1 -x kitty 2>/dev/null || true"

# ── starship prompt ──────────────────────────────────────────
[templates.starship]
input_path = "~/.config/starship/matugen-template.toml"
output_path = "~/.config/starship.toml"
