# Matugen template for starship — DO NOT edit the generated ~/.config/starship.toml.
# Source: ~/.config/starship/matugen-template.toml
# Output: ~/.config/starship.toml  (regenerated by `matugen image <wallpaper>`)
#
# Powerline prompt tuned for MLOps (git, python, docker, kubernetes, aws).
# Palette colours come from the wallpaper via matugen Material-You roles.

"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 1000

# Configures the format of the prompt.
format = """
[](color_red0)\
$os\
$username\
[](bg:color_orange fg:color_red0)\
$directory\
[](fg:color_orange bg:color_yellow)\
$git_branch\
$git_status\
[](fg:color_yellow bg:color_green)\
$c\
$dotnet\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$elixir\
$elm\
$gradle\
$julia\
$nim\
$scala\
[](fg:color_green bg:color_cyan)\
$docker_context\
$kubernetes\
$aws\
[ ](color_cyan)\
$fill\
([ ](mono4)\
$time\
$battery\
[](mono4))\
$line_break$character"""

# Palette driven by matugen (wallpaper-derived Material-You roles).
palette = 'matugen'

[palettes.matugen]
mono0 = '{{colors.on_surface.default.hex}}'
mono1 = '{{colors.on_surface_variant.default.hex}}'
mono2 = '{{colors.outline.default.hex}}'
mono3 = '{{colors.surface_variant.default.hex}}'
mono4 = '{{colors.surface_container_high.default.hex}}'
color_red0 = '{{colors.primary.default.hex}}'
color_red1 = '{{colors.error.default.hex}}'
color_green = '{{colors.primary.default.hex}}'
color_yellow = '{{colors.tertiary.default.hex}}'
color_blue = '{{colors.primary.default.hex}}'
color_purple = '{{colors.tertiary.default.hex}}'
color_cyan = '{{colors.secondary.default.hex}}'
color_orange = '{{colors.secondary.default.hex}}'
syntax_fg = '{{colors.on_surface.default.hex}}'
syntax_bg = '{{colors.surface.default.hex}}'
color_bg2 = '{{colors.surface_container.default.hex}}'
syntax_gutter = '{{colors.outline.default.hex}}'
syntax_accent = '{{colors.primary.default.hex}}'

# Module that displays the current OS.
[os]
disabled = false
style = "bg:color_red0 fg:syntax_bg"
format = '[ $symbol ]($style)'

[os.symbols]
Alpine = ""
Amazon = ""
Android = "󰀲"
Arch = ""
CentOS = ""
Debian = "󰣚"
EndeavourOS = ""
Fedora = "󰣛"
FreeBSD = "󰣠"
Gentoo = "󰣨"
Illumos = ""
Linux = "󰌽"
Macos = "󰀵"
Manjaro = "󱘊"
Mint = "󰣭"
NixOS = "󱄅"
OpenBSD = ""
openSUSE = ""
Pop = ""
Raspbian = ""
Redhat = "󱄛"
RedHatEnterprise = "󱄛"
Redox = "R"
Solus = ""
SUSE = ""
Ubuntu = "󰕈"
Unknown = ""
Windows = "󰍲"

# Module that displays the current username.
[username]
show_always = true
style_user = "bold bg:color_red0 fg:syntax_bg"
style_root = "bold italic bg:color_red0 fg:syntax_bg"
format = '[ $user ]($style)'

# Module that displays the current directory.
[directory]
style = "italic fg:syntax_bg bg:color_orange"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

# Module that displays the current git branch.
[git_branch]
symbol = ""
style = "bg:color_yellow"
format = '[[ $symbol $branch ](fg:syntax_bg bg:color_yellow)]($style)'

# Module that displays the current git status.
[git_status]
style = "bg:color_yellow"
format = '[[($all_status$ahead_behind )](fg:syntax_bg bg:color_yellow)]($style)'

# Language specific modules
[nodejs]
symbol = ""
style = "bg:color_green"
format = '[[ $symbol( $version) ](fg:syntax_bg bg:color_green)]($style)'

[c]
symbol = " "
style = "bg:color_green"
format = '[[ $symbol( $version) ](fg:syntax_bg bg:color_green)]($style)'

[dotnet]
symbol = "󰪮"
style = "bg:color_green"
format = '[[ $symbol( $version) ](fg:syntax_bg bg:color_green)]($style)'

[rust]
symbol = ""
style = "bg:color_green"
format = '[[ $symbol( $version) ](fg:syntax_bg bg:color_green)]($style)'

[golang]
symbol = ""
style = "bg:color_green"
format = '[[ $symbol( $version) ](fg:syntax_bg bg:color_green)]($style)'

[php]
symbol = " "
style = "bg:color_green"
format = '[[ $symbol( $version) ](fg:syntax_bg bg:color_green)]($style)'

[java]
symbol = " "
style = "bg:color_green"
format = '[[ $symbol( $version) ](fg:syntax_bg bg:color_green)]($style)'

[kotlin]
symbol = " "
style = "bg:color_green"
format = '[[ $symbol( $version) ](fg:syntax_bg bg:color_green)]($style)'

[haskell]
symbol = " "
style = "bg:color_green"
format = '[[ $symbol( $version) ](fg:syntax_bg bg:color_green)]($style)'

[python]
symbol = " "
style = "bg:color_green"
format = '[[ $symbol( $version)(\($virtualenv\)) ](fg:syntax_bg bg:color_green)]($style)'

[elixir]
symbol = " "
style = "bg:color_green"
format = '[[ $symbol ($version) ](fg:syntax_bg bg:color_green)]($style)'

[elm]
symbol = " "
style = "bg:color_green"
format = '[[ $symbol ($version) ](fg:syntax_bg bg:color_green)]($style)'

[gradle]
symbol = " "
style = "bg:color_green"
format = '[[ $symbol ($version) ](fg:syntax_bg bg:color_green)]($style)'

[julia]
symbol = " "
style = "bg:color_green"
format = '[[ $symbol ($version) ](fg:syntax_bg bg:color_green)]($style)'

[nim]
symbol = "󰆥 "
style = "bg:color_green"
format = '[[ $symbol ($version) ](fg:syntax_bg bg:color_green)]($style)'

[scala]
symbol = " "
style = "bg:color_green"
format = '[[ $symbol ($version) ](fg:syntax_bg bg:color_green)]($style)'

# ── MLOps context: docker / kubernetes / aws (cyan band) ──────────
[docker_context]
symbol = " "
style = "bg:color_cyan"
format = '[[ $symbol( $context) ](fg:syntax_bg bg:color_cyan)]($style)'

[kubernetes]
disabled = false
symbol = "󱃾 "
style = "bg:color_cyan"
format = '[[ $symbol$context(:$namespace) ](fg:syntax_bg bg:color_cyan)]($style)'
detect_files = ['Dockerfile', 'Chart.yaml', 'kustomization.yaml', 'skaffold.yaml']
detect_extensions = ['yaml', 'yml', 'tf']

[aws]
disabled = false
symbol = " "
style = "bg:color_cyan"
format = '[[ $symbol($profile )(\($region\)) ](fg:syntax_bg bg:color_cyan)]($style)'

# Module that fills the space between the left and right segments.
[fill]
symbol = " "

# Module that displays the time.
[time]
disabled = false
use_12hr = true
style = "bg:mono4"
format = '[[ 󰥔 $time ](fg:syntax_fg bg:mono4)]($style)'

# Module that displays the battery level and status.
[battery]
format = '[$symbol $percentage ]($style)'

[[battery.display]]
threshold = 10
style = "bold bg:mono4 fg:color_red1"
discharging_symbol = "󰁺"
charging_symbol = "󰢜"

[[battery.display]]
threshold = 20
style = "bold bg:mono4 fg:color_red0"
discharging_symbol = "󰁻"
charging_symbol = "󰂆"

[[battery.display]]
threshold = 30
style = "bold bg:mono4 fg:color_yellow"
discharging_symbol = "󰁼"
charging_symbol = "󰂇"

[[battery.display]]
threshold = 50
style = "bold bg:mono4 fg:color_yellow"
discharging_symbol = "󰁾"
charging_symbol = "󰢝"

[[battery.display]]
threshold = 80
style = "bold bg:mono4 fg:color_green"
discharging_symbol = "󰂁"
charging_symbol = "󰂊"

[[battery.display]]
style = "bold bg:mono4 fg:color_green"
discharging_symbol = "󰁹"
charging_symbol = "󰂅"
threshold = 100

# Character — shows vim mode (req: vim mode visibility).
[character]
success_symbol = '[󰅂](bold fg:syntax_accent)'
error_symbol = '[](bold fg:color_red1)'
vimcmd_symbol = '[ N 󰅁](bold fg:syntax_accent)'
vimcmd_replace_one_symbol = '[ R 󰅁](bold fg:color_purple)'
vimcmd_replace_symbol = '[ R 󰅁](bold fg:color_purple)'
vimcmd_visual_symbol = '[ V 󰅁](bold fg:color_yellow)'
